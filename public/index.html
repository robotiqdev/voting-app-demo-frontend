<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude &amp; Code Meetup #2 — Zagreb</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 2.5rem 3rem;
      gap: 2rem;
    }

    header { text-align: center; }

    .eyebrow {
      font-size: clamp(0.65rem, 1.2vw, 0.85rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #d97706;
      margin-bottom: 0.6rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .scan-hint {
      margin-top: 0.6rem;
      font-size: clamp(0.75rem, 1.4vw, 1rem);
      color: #555;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .col {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .col.winner {
      border-color: #d97706;
      box-shadow: 0 0 32px rgba(217,119,6,0.15), inset 0 0 60px rgba(217,119,6,0.04);
    }

    .topic {
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      font-weight: 700;
      text-align: center;
      color: #888;
      line-height: 1.2;
    }

    .col.winner .topic { color: #d97706; }

    .qr-code {
      width: clamp(160px, 22vw, 280px);
      height: clamp(160px, 22vw, 280px);
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin: auto 0;
    }

    .qr-code canvas, .qr-code img { width: 100%; height: 100%; }

    .col:not(.winner) .qr-code { opacity: 0.5; }

    .pct {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #333;
      line-height: 1;
    }

    .col.winner .pct { color: #d97706; }

    .bar-track {
      width: 100%;
      height: 8px;
      background: #1e1e1e;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 8px;
      border-radius: 4px;
      background: #2a2a2a;
      transition: width 0.6s ease;
    }

    .col.winner .bar-fill { background: #d97706; }

    .votes-label {
      font-size: clamp(0.9rem, 1.8vw, 1.3rem);
      color: #444;
    }

    .col.winner .votes-label { color: #7a4a10; }

    footer {
      text-align: center;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: #333;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">Claude &amp; Code Meetup #2 · Zagreb</div>
    <h1>What should we cover next?</h1>
    <p class="scan-hint">Scan the QR code for your topic to vote</p>
  </header>

  <div class="columns">
    <div class="col" id="opt-multi-agent">
      <div class="topic">Multi-Agent Systems</div>
      <div class="qr-code"></div>
      <div class="pct">0%</div>
      <div class="bar-track"><div class="bar-fill" style="width:0%"></div></div>
      <div class="votes-label">0 votes</div>
    </div>
    <div class="col" id="opt-claude-prod">
      <div class="topic">Claude in Production</div>
      <div class="qr-code"></div>
      <div class="pct">0%</div>
      <div class="bar-track"><div class="bar-fill" style="width:0%"></div></div>
      <div class="votes-label">0 votes</div>
    </div>
    <div class="col" id="opt-mcp">
      <div class="topic">Building MCP Servers</div>
      <div class="qr-code"></div>
      <div class="pct">0%</div>
      <div class="bar-track"><div class="bar-fill" style="width:0%"></div></div>
      <div class="votes-label">0 votes</div>
    </div>
  </div>

  <footer id="total-votes">0 total votes · updating live</footer>

  <script>
    let API = '';

    const topics = [
      "Multi-Agent Systems",
      "Claude in Production",
      "Building MCP Servers"
    ];

    const optionEls = {
      "Multi-Agent Systems": document.querySelector('#opt-multi-agent'),
      "Claude in Production": document.querySelector('#opt-claude-prod'),
      "Building MCP Servers": document.querySelector('#opt-mcp'),
    };

    function updateUI(votes) {
      const total = Object.values(votes).reduce((a, b) => a + b, 0);
      const maxVotes = total > 0 ? Math.max(...Object.values(votes)) : -1;

      topics.forEach(topic => {
        const col = optionEls[topic];
        const count = votes[topic] ?? 0;
        const pct = total > 0 ? Math.round((count / total) * 100) : 0;

        col.querySelector('.pct').textContent = `${pct}%`;
        col.querySelector('.bar-fill').style.width = `${pct}%`;
        col.querySelector('.votes-label').textContent =
          count === 1 ? '1 vote' : `${count} votes`;

        if (total > 0 && count === maxVotes) {
          col.classList.add('winner');
        } else {
          col.classList.remove('winner');
        }
      });

      const totalEl = document.getElementById('total-votes');
      totalEl.textContent = total === 1
        ? '1 total vote · updating live'
        : `${total} total votes · updating live`;
    }

    async function fetchResults() {
      try {
        const res = await fetch(`${API}/results`, {
          headers: { 'ngrok-skip-browser-warning': 'true' },
        });
        const data = await res.json();
        updateUI(data);
      } catch (e) {
        console.warn('Could not fetch results:', e.message);
      }
    }

    (async () => {
      try {
        const cfg = await fetch('/config.json');
        const data = await cfg.json();
        API = data.api || '';
      } catch (e) {
        API = '';
      }

      const BASE_URL = API.replace(/\/api$/, '');
      topics.forEach(topic => {
        const col = optionEls[topic];
        const qrDiv = col.querySelector('.qr-code');
        new QRCode(qrDiv, {
          text: BASE_URL + '/vote?topic=' + encodeURIComponent(topic),
          width: 256,
          height: 256
        });
      });

      fetchResults();
      setInterval(fetchResults, 3000);
    })();
  </script>
</body>
</html>
