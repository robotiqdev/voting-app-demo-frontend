<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude &amp; Code Meetup #2 — Zagreb</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 2.5rem 3rem;
      gap: 2rem;
    }

    header { text-align: center; }

    .eyebrow {
      font-size: clamp(0.65rem, 1.2vw, 0.85rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #d97706;
      margin-bottom: 0.6rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .scan-hint {
      margin-top: 0.6rem;
      font-size: clamp(0.75rem, 1.4vw, 1rem);
      color: #555;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .col {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .col.winner {
      border-color: #d97706;
      box-shadow: 0 0 32px rgba(217,119,6,0.15), inset 0 0 60px rgba(217,119,6,0.04);
    }

    .topic {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 700;
      text-align: center;
      color: #888;
      line-height: 1.2;
    }

    .col.winner .topic { color: #d97706; }

    .qr-code {
      width: clamp(120px, 18vw, 220px);
      height: clamp(120px, 18vw, 220px);
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .col:not(.winner) .qr-code { opacity: 0.5; }

    .pct {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #333;
      line-height: 1;
    }

    .col.winner .pct { color: #d97706; }

    .bar-track {
      width: 100%;
      height: 8px;
      background: #1e1e1e;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 8px;
      border-radius: 4px;
      background: #2a2a2a;
      transition: width 0.6s ease;
    }

    .col.winner .bar-fill { background: #d97706; }

    .votes-label {
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: #444;
    }

    .col.winner .votes-label { color: #7a4a10; }

    footer {
      text-align: center;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: #333;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Claude &amp; Code Meetup #2 — Zagreb</h1>
    <p class="subtitle">What should we cover next meetup?</p>
  </header>

  <div class="options">
    <div class="option" id="opt-multi-agent">
      <button class="vote-btn" data-topic="Multi-Agent Systems">Multi-Agent Systems</button>
      <div class="vote-count">0 votes</div>
    </div>
    <div class="option" id="opt-claude-prod">
      <button class="vote-btn" data-topic="Claude in Production">Claude in Production</button>
      <div class="vote-count">0 votes</div>
    </div>
    <div class="option" id="opt-mcp">
      <button class="vote-btn" data-topic="Building MCP Servers">Building MCP Servers</button>
      <div class="vote-count">0 votes</div>
    </div>
  </div>

  <p class="thanks" id="thanks-msg">Thanks for voting!</p>
  <p class="total" id="total-votes">0 total votes</p>

  <script>
    let API = '';
    const STORAGE_KEY = 'zagreb_voted';

    const topics = [
      "Multi-Agent Systems",
      "Claude in Production",
      "Building MCP Servers"
    ];

    // Map topic name → DOM elements
    const optionEls = {
      "Multi-Agent Systems": document.querySelector('#opt-multi-agent'),
      "Claude in Production": document.querySelector('#opt-claude-prod'),
      "Building MCP Servers": document.querySelector('#opt-mcp'),
    };

    function updateUI(votes) {
      const total = Object.values(votes).reduce((a, b) => a + b, 0);
      const maxVotes = Math.max(...Object.values(votes));

      topics.forEach(topic => {
        const el = optionEls[topic];
        const count = votes[topic] ?? 0;
        const countEl = el.querySelector('.vote-count');
        const btn = el.querySelector('.vote-btn');

        const newText = count === 1 ? '1 vote' : `${count} votes`;
        if (countEl.textContent !== newText) {
          countEl.textContent = newText;
          countEl.classList.add('updated');
          setTimeout(() => countEl.classList.remove('updated'), 600);
        }

        // Highlight winner (only when votes exist)
        if (total > 0 && count === maxVotes) {
          btn.style.background = '#d97706';
          el.style.outline = '2px solid #d97706';
          el.style.outlineOffset = '4px';
          el.style.borderRadius = '12px';
        } else {
          btn.style.background = '';
          el.style.outline = '';
        }
      });

      document.getElementById('total-votes').textContent =
        total === 1 ? '1 total vote' : `${total} total votes`;
    }

    async function fetchResults() {
      try {
        const res = await fetch(`${API}/results`, {
          headers: { 'ngrok-skip-browser-warning': 'true' },
        });
        const data = await res.json();
        updateUI(data);
      } catch (e) {
        console.warn('Could not fetch results:', e.message);
      }
    }

    async function castVote(topic) {
      try {
        const res = await fetch(`${API}/vote`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
          body: JSON.stringify({ topic }),
        });
        const data = await res.json();
        updateUI(data);
      } catch (e) {
        console.warn('Vote failed:', e.message);
      }
    }

    function disableAllButtons() {
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.disabled = true;
      });
      document.getElementById('thanks-msg').style.display = 'block';
    }

    // On load: fetch config, then restore state and start polling
    (async () => {
      try {
        const cfg = await fetch('/config.json');
        const data = await cfg.json();
        API = data.api || '';
      } catch (e) {
        API = '';
      }

      // Generate QR codes for each voting option
      const BASE_URL = API.replace(/\/api$/, '');
      topics.forEach(topic => {
        const el = optionEls[topic];
        const qrDiv = document.createElement('div');
        qrDiv.className = 'qr-code';
        el.appendChild(qrDiv);
        new QRCode(qrDiv, {
          text: BASE_URL + '/vote?topic=' + encodeURIComponent(topic),
          width: 128,
          height: 128
        });
      });

      if (localStorage.getItem(STORAGE_KEY)) {
        disableAllButtons();
      }

      fetchResults();

      // Poll every 3 seconds for live updates
      setInterval(fetchResults, 3000);

      // Wire up vote buttons
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const topic = btn.dataset.topic;
          localStorage.setItem(STORAGE_KEY, topic);
          disableAllButtons();
          await castVote(topic);
        });
      });
    })();
  </script>
</body>
</html>
